<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoa</title>
</head>
<body>

    <h1>Exemplo de Objeto Pessoa</h1>
    <p>Abra o console do seu navegador (F12) para visualizar o objeto criado.</p>

    <script>
        // Criação do Objeto Pessoas em JavaScript
        const pessoa = {
            cpf: "123.456.789-00",
            nome: "João",
            sobrenome: "Silva",
            sexo: "Masculino",
            estadoCivil: "Solteiro"
        };

        // Exibindo o objeto no console para verificação
        console.log(pessoa);

        // Exibindo propriedades específicas no console
        console.log("Nome: " + pessoa.nome);
        console.log("Estado Civil: " + pessoa.estadoCivil);
    </script>
</body>
</html>
